name: Android Build & Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Validate web app
        run: npm run ci

      - name: Install Playwright Chromium
        run: npm run test:viewport:install

      - name: Run viewport matrix
        run: npm run test:viewport

      - name: Ensure Android platform exists
        run: |
          if [ ! -d "android/app" ]; then
            npx cap add android
          fi

      - name: Decode Keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 -d > android/prompt-repo.jks
          ls -lh android/prompt-repo.jks

      - name: Build Android APK
        env:
          BUILD_TYPE: ${{ startsWith(github.ref, 'refs/tags/v') && 'release' || 'debug' }}
          KEYSTORE_PATH: ${{ startsWith(github.ref, 'refs/tags/v') && 'android/prompt-repo.jks' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./scripts/build-android.sh

      - name: Locate APK
        id: locate_apk
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]]; then
            APK_PATH=$(find android/app/build/outputs/apk -name "app-release.apk" | head -n 1)
            APK_TYPE="release"
          else
            APK_PATH=$(find android/app/build/outputs/apk -name "app-debug.apk" | head -n 1)
            APK_TYPE="debug"
          fi
          
          if [ -z "$APK_PATH" ]; then
            echo "No APK was produced" >&2
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "type=$APK_TYPE" >> "$GITHUB_OUTPUT"
          echo "Found $APK_TYPE APK: $APK_PATH"

      - name: Rename APK for release convention
        id: rename_apk
        run: |
          VERSION_TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            FINAL_NAME="app-prompt-${VERSION_TAG}-signed.apk"
          else
            FINAL_NAME="app-prompt-${GITHUB_SHA::7}.apk"
          fi
          cp "${{ steps.locate_apk.outputs.path }}" "./${FINAL_NAME}"
          echo "path=./${FINAL_NAME}" >> "$GITHUB_OUTPUT"
          echo "Final APK name: ${FINAL_NAME}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-repository-${{ steps.locate_apk.outputs.type }}-apk
          path: ${{ steps.rename_apk.outputs.path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename_apk.outputs.path }}
          name: Prompt Repository ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
