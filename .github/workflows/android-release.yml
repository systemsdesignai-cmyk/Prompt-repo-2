name: Android Build & Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Validate web app
        run: npm run ci

      - name: Ensure Android platform exists
        run: |
          if [ ! -d "android/app" ]; then
            npx cap add android
          fi

      - name: Build Android APK
        env:
          BUILD_TYPE: debug
        run: ./scripts/build-android.sh

      - name: Locate APK
        id: locate_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "app-debug.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK was produced" >&2
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-repository-debug-apk
          path: ${{ steps.locate_apk.outputs.path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate_apk.outputs.path }}
          name: Prompt Repository ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
