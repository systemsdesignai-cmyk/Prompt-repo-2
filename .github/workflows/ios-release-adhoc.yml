name: iOS Build & Release (Ad Hoc OTA)

# on:
#   push:
#     tags: ["mobile-v*"]
#   workflow_dispatch:

jobs:
  build-adhoc:
    runs-on: macos-15
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate web app
        run: npm run ci

      - name: Build Web Assets and Sync Capacitor
        working-directory: apps/mobile
        run: ./scripts/build-ios.sh

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temporary_keychain_password' }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode certificate and provisioning profile
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security list-keychains -d user -s $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Create ExportOptions.plist
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>ai.prompt.repository</key>
                  <string>${{ secrets.IOS_PROVISION_PROFILE_NAME }}</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Build Archive
        run: |
          xcodebuild -workspace apps/mobile/ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=${{ secrets.IOS_TEAM_ID }}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build

      - name: Determine Version and Tag
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/mobile-v* ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=latest-adhoc" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename and Relocate IPA
        id: rename_ipa
        run: |
          IPA_PATH=$(find $RUNNER_TEMP/build -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA was produced" >&2
            exit 1
          fi
          
          VERSION_TAG="${{ steps.get_version.outputs.tag_name }}"
          FINAL_NAME="app-prompt-${VERSION_TAG}.ipa"
          
          cp "$IPA_PATH" "./${FINAL_NAME}"
          echo "path=./${FINAL_NAME}" >> "$GITHUB_OUTPUT"
          echo "name=${FINAL_NAME}" >> "$GITHUB_OUTPUT"
          echo "Found and prepared IPA: ${FINAL_NAME}"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          files: ${{ steps.rename_ipa.outputs.path }}
          name: Prompt Repository Mobile ${{ steps.get_version.outputs.tag_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OTA Landing Page and Manifest
        run: |
          mkdir -p github-pages-dist
          
          # Compute lower-case owner and repo name for GitHub Pages URL
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          # Setup variables
          VERSION_TAG="${{ steps.get_version.outputs.tag_name }}"
          IPA_DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION_TAG}/${{ steps.rename_ipa.outputs.name }}"
          MANIFEST_URL="https://${OWNER_LOWER}.github.io/${REPO_LOWER}/manifest.plist"
          
          # 1. Generate manifest.plist
          cat <<EOF > github-pages-dist/manifest.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>items</key>
              <array>
                  <dict>
                      <key>assets</key>
                      <array>
                          <dict>
                              <key>kind</key>
                              <string>software-package</string>
                              <key>url</key>
                              <string>${IPA_DOWNLOAD_URL}</string>
                          </dict>
                      </array>
                      <key>metadata</key>
                      <dict>
                          <key>bundle-identifier</key>
                          <string>ai.prompt.repository</string>
                          <key>bundle-version</key>
                          <string>1.0.0</string>
                          <key>kind</key>
                          <string>software</string>
                          <key>title</key>
                          <string>Prompt Repository</string>
                      </dict>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF

          # 2. Generate premium index.html landing page from template
          cat <<'EOF' > github-pages-dist/index.html.template
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Download Prompt Repository (iOS)</title>
              <link rel="preconnect" href="https://fonts.googleapis.com">
              <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
              <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
              <style>
                  :root {
                      --bg-color: #030014;
                      --card-bg: rgba(255, 255, 255, 0.03);
                      --card-border: rgba(255, 255, 255, 0.08);
                      --text-primary: #f5f5f7;
                      --text-secondary: #86868b;
                      --primary-glow: linear-gradient(135deg, #ff007a 0%, #7928ca 50%, #00dfd8 100%);
                      --accent: #7928ca;
                      --accent-glow: rgba(121, 40, 202, 0.15);
                  }

                  * {
                      box-sizing: border-box;
                      margin: 0;
                      padding: 0;
                      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                      -webkit-font-smoothing: antialiased;
                  }

                  body {
                      background-color: var(--bg-color);
                      color: var(--text-primary);
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      overflow-x: hidden;
                      position: relative;
                  }

                  /* Abstract glowing background blobs */
                  .glow-blob {
                      position: absolute;
                      border-radius: 50%;
                      filter: blur(100px);
                      z-index: 0;
                      opacity: 0.4;
                      pointer-events: none;
                  }

                  .blob-1 {
                      width: 400px;
                      height: 400px;
                      background: #ff007a;
                      top: -100px;
                      left: -100px;
                      animation: float 20s ease-in-out infinite alternate;
                  }

                  .blob-2 {
                      width: 500px;
                      height: 500px;
                      background: #7928ca;
                      bottom: -150px;
                      right: -100px;
                      animation: float 25s ease-in-out infinite alternate-reverse;
                  }

                  .blob-3 {
                      width: 300px;
                      height: 300px;
                      background: #00dfd8;
                      top: 40%;
                      left: 50%;
                      transform: translate(-50%, -50%);
                      animation: pulse-glow 8s ease-in-out infinite;
                  }

                  @keyframes float {
                      0% { transform: translate(0, 0) scale(1); }
                      100% { transform: translate(50px, 30px) scale(1.1); }
                  }

                  @keyframes pulse-glow {
                      0%, 100% { opacity: 0.15; }
                      50% { opacity: 0.3; }
                  }

                  .container {
                      width: 100%;
                      max-width: 480px;
                      padding: 24px;
                      z-index: 1;
                  }

                  .card {
                      background: var(--card-bg);
                      backdrop-filter: blur(20px);
                      -webkit-backdrop-filter: blur(20px);
                      border: 1px solid var(--card-border);
                      border-radius: 28px;
                      padding: 40px 32px;
                      text-align: center;
                      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
                      position: relative;
                      overflow: hidden;
                  }

                  .card::before {
                      content: '';
                      position: absolute;
                      top: 0;
                      left: -50%;
                      width: 200%;
                      height: 100%;
                      background: linear-gradient(
                          to right,
                          rgba(255, 255, 255, 0) 0%,
                          rgba(255, 255, 255, 0.03) 50%,
                          rgba(255, 255, 255, 0) 100%
                      );
                      transform: skewX(-25deg);
                      transition: 0.75s;
                      pointer-events: none;
                  }

                  .card:hover::before {
                      left: 120%;
                  }

                  /* App Icon with animated gradients */
                  .app-icon-container {
                      width: 96px;
                      height: 96px;
                      margin: 0 auto 24px;
                      position: relative;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                  }

                  .app-icon-glow {
                      position: absolute;
                      top: 0;
                      left: 0;
                      width: 100%;
                      height: 100%;
                      background: var(--primary-glow);
                      border-radius: 22px;
                      filter: blur(12px);
                      opacity: 0.6;
                      transform: scale(0.9);
                      animation: pulse-icon 3s ease-in-out infinite;
                  }

                  .app-icon {
                      position: relative;
                      width: 96px;
                      height: 96px;
                      background: linear-gradient(135deg, #1f1b2e 0%, #0d0a1b 100%);
                      border-radius: 22px;
                      border: 1px solid rgba(255, 255, 255, 0.1);
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      overflow: hidden;
                      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2);
                  }

                  .app-icon svg {
                      width: 48px;
                      height: 48px;
                      fill: none;
                      stroke: #f5f5f7;
                      stroke-width: 2;
                      stroke-linecap: round;
                      stroke-linejoin: round;
                  }

                  @keyframes pulse-icon {
                      0%, 100% { transform: scale(0.9); opacity: 0.5; }
                      50% { transform: scale(1.05); opacity: 0.8; }
                  }

                  h1 {
                      font-size: 28px;
                      font-weight: 800;
                      margin-bottom: 8px;
                      background: linear-gradient(to right, #ffffff, #a5a5b1);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                      letter-spacing: -0.5px;
                  }

                  .version {
                      font-size: 14px;
                      color: var(--text-secondary);
                      font-weight: 500;
                      margin-bottom: 32px;
                      display: inline-block;
                      background: rgba(255, 255, 255, 0.05);
                      padding: 4px 12px;
                      border-radius: 12px;
                      border: 1px solid rgba(255, 255, 255, 0.03);
                  }

                  /* Premium Glass Button */
                  .btn-install {
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      gap: 12px;
                      background: var(--primary-glow);
                      color: #ffffff;
                      text-decoration: none;
                      font-weight: 700;
                      font-size: 16px;
                      padding: 16px 32px;
                      border-radius: 16px;
                      box-shadow: 0 8px 30px rgba(121, 40, 202, 0.4);
                      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
                      border: none;
                      cursor: pointer;
                      margin-bottom: 32px;
                  }

                  .btn-install:hover {
                      transform: translateY(-2px);
                      box-shadow: 0 12px 40px rgba(121, 40, 202, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.2);
                  }

                  .btn-install:active {
                      transform: translateY(1px);
                  }

                  .btn-install svg {
                      width: 20px;
                      height: 20px;
                      fill: none;
                      stroke: currentColor;
                      stroke-width: 2.5;
                  }

                  /* Divider */
                  .divider {
                      height: 1px;
                      background: linear-gradient(to right, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
                      margin-bottom: 28px;
                  }

                  /* Installation Instructions */
                  .instructions {
                      text-align: left;
                  }

                  .instructions-title {
                      font-size: 14px;
                      font-weight: 700;
                      color: var(--text-primary);
                      text-transform: uppercase;
                      letter-spacing: 1px;
                      margin-bottom: 16px;
                  }

                  .step {
                      display: flex;
                      gap: 14px;
                      margin-bottom: 16px;
                      align-items: flex-start;
                  }

                  .step-num {
                      width: 24px;
                      height: 24px;
                      background: rgba(255, 255, 255, 0.05);
                      border: 1px solid rgba(255, 255, 255, 0.08);
                      border-radius: 50%;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 12px;
                      font-weight: 700;
                      color: #00dfd8;
                      flex-shrink: 0;
                      margin-top: 2px;
                  }

                  .step-text {
                      font-size: 14px;
                      line-height: 1.5;
                      color: var(--text-secondary);
                  }

                  .step-text strong {
                      color: var(--text-primary);
                      font-weight: 600;
                  }

                  /* Subtle footer */
                  .footer {
                      margin-top: 24px;
                      font-size: 11px;
                      color: rgba(255, 255, 255, 0.2);
                      font-weight: 500;
                  }
              </style>
          </head>
          <body>

              <div class="glow-blob blob-1"></div>
              <div class="glow-blob blob-2"></div>
              <div class="glow-blob blob-3"></div>

              <div class="container">
                  <div class="card">
                      <div class="app-icon-container">
                          <div class="app-icon-glow"></div>
                          <div class="app-icon">
                              <svg viewBox="0 0 24 24">
                                  <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                              </svg>
                          </div>
                      </div>

                      <h1>Prompt Repository</h1>
                      <span class="version">iOS Beta - v__VERSION__</span>

                      <a href="itms-services://?action=download-manifest&url=__MANIFEST_URL__" class="btn-install">
                          <svg viewBox="0 0 24 24">
                              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                          </svg>
                          Install Application
                      </a>

                      <div class="divider"></div>

                      <div class="instructions">
                          <div class="instructions-title">Installation Guide</div>
                          
                          <div class="step">
                              <div class="step-num">1</div>
                              <div class="step-text">Tap the <strong>Install Application</strong> button above, then tap <strong>Install</strong> on the system prompt.</div>
                          </div>

                          <div class="step">
                              <div class="step-num">2</div>
                              <div class="step-text">Wait for the app to finish downloading and installing on your home screen.</div>
                          </div>

                          <div class="step">
                              <div class="step-num">3</div>
                              <div class="step-text">Go to <strong>Settings &gt; General &gt; VPN &amp; Device Management</strong>.</div>
                          </div>

                          <div class="step">
                              <div class="step-num">4</div>
                              <div class="step-text">Select your developer profile/certificate under <strong>Enterprise App</strong> or <strong>Developer App</strong>, and tap <strong>Trust</strong>.</div>
                          </div>
                      </div>
                  </div>

                  <div style="text-align: center;">
                      <p class="footer">Securely signed via Apple Ad Hoc Distribution. Device registration required.</p>
                  </div>
              </div>

          </body>
          </html>
          EOF
          
          # Replace placeholders using sed
          sed -e "s|__VERSION__|${VERSION_TAG}|g" \
              -e "s|__MANIFEST_URL__|${MANIFEST_URL}|g" \
              github-pages-dist/index.html.template > github-pages-dist/index.html
              
          rm github-pages-dist/index.html.template

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './github-pages-dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
